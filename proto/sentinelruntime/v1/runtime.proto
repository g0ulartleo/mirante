syntax = "proto3";

package sentinelruntime.v1;

option go_package = "github.com/g0ulartleo/mirante/proto/sentinelruntime/v1;sentinelruntimev1";

service SentinelRuntime {
  rpc Check(CheckRequest) returns (CheckResponse);
}

message CheckRequest {
  string alarm_id = 1;
  string sentinel_type = 2;

  // config_json is intentionally opaque to Mirante core.
  // The worker forwards raw JSON bytes and each runner implementation
  // parses/validates config in its own runtime.
  // This keeps sentinel implementations language-agnostic and allows
  // private/external runners in any language/repository.
  bytes config_json = 3;
}

enum SignalStatus {
  SIGNAL_STATUS_UNSPECIFIED = 0;
  SIGNAL_STATUS_HEALTHY = 1;
  SIGNAL_STATUS_UNHEALTHY = 2;
  SIGNAL_STATUS_UNKNOWN = 3;
}

enum RuntimeErrorCode {
  RUNTIME_ERROR_CODE_UNSPECIFIED = 0;
  RUNTIME_ERROR_CODE_UNSUPPORTED_TYPE = 1;
  RUNTIME_ERROR_CODE_INVALID_CONFIG = 2;
  RUNTIME_ERROR_CODE_CHECK_FAILED = 3;
  RUNTIME_ERROR_CODE_INTERNAL = 4;
}

message RuntimeError {
  RuntimeErrorCode code = 1;
  string message = 2;
}

message CheckResponse {
  SignalStatus status = 1;
  string message = 2;

  // error is optional and set when sentinel execution could not be completed
  // as expected (for example, invalid config or unsupported type).
  RuntimeError error = 3;
}
