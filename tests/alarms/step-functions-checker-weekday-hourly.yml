id: test-step-functions-weekday-hourly
name: Weekday Hourly Step Function Monitor
description: "Monitors a Step Function that runs every hour on weekdays (Monday-Friday)"
interval: 30m
type: step-functions-checker
path: ['Test']
config:
  state_machine_arn: arn:aws:states:us-east-1:123456789012:stateMachine:weekday-sync
  expected_cron: "0 * * * 1-5"
  aws_region: us-east-1

