id: test-step-functions-weekend-daily
name: Weekend Daily Step Function Monitor
description: "Monitors a Step Function that runs once daily on weekends (Saturday-Sunday) at 9 AM"
interval: 30m
type: step-functions-checker
path: ['Test']
config:
  state_machine_arn: arn:aws:states:us-east-1:123456789012:stateMachine:weekend-batch
  expected_cron: "0 9 * * 0,6"
  aws_region: us-east-1

