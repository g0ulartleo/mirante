id: test-step-functions-business-hours
name: Business Hours Step Function Monitor
description: "Monitors a Step Function that runs every hour during business hours (9 AM - 5 PM) on weekdays"
interval: 30m
type: step-functions-checker
path: ['Test']
config:
  state_machine_arn: arn:aws:states:us-east-1:123456789012:stateMachine:business-hours-sync
  expected_cron: "0 9-17 * * 1-5"
  aws_region: us-east-1

