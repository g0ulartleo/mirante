name: Release Go Alarms SDK

on:
  push:
    tags:
      - 'packages/go/alarms/v*'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/go/alarms
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.24.2'

    - name: Generate proto stubs
      run: make -C "${{ github.workspace }}" proto-generate-go-sdk

    - name: Check generated stubs match committed
      run: |
        if [ -n "$(git status --porcelain packages/go/alarms/alarmruntime)" ]; then
          echo "Proto stubs are stale. Run 'make proto-generate-go-sdk' and commit."
          exit 1
        fi

    - name: Test
      run: go test ./...
