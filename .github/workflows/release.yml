name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set release metadata
      id: release
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        if [[ "$VERSION" == *-* ]]; then
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Go
      uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0
      with:
        go-version: '1.24.2'

    - name: Build CLI
      run: |
        VERSION="${{ steps.release.outputs.version }}"
        LDFLAGS="-X github.com/g0ulartleo/mirante/internal/cli.Version=$VERSION -s -w"
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o mirante-linux-amd64 ./cmd/cli/main.go
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o mirante-linux-arm64 ./cmd/cli/main.go
        CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o mirante-darwin-amd64 ./cmd/cli/main.go
        CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o mirante-darwin-arm64 ./cmd/cli/main.go
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o mirante-windows-amd64.exe ./cmd/cli/main.go

        chmod +x mirante-*

    - name: Log in to Docker Hub
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & push Docker image
      run: |
        IMAGE=g0ulartleo/mirante
        TAG="${{ steps.release.outputs.version }}"
        if [[ "${{ steps.release.outputs.prerelease }}" == "true" ]]; then
          docker build -t $IMAGE:$TAG .
        else
          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
        fi
        docker push $IMAGE:$TAG
        if [[ "${{ steps.release.outputs.prerelease }}" == "false" ]]; then
          docker push $IMAGE:latest
        fi

    - name: Create Release
      uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
      with:
        files: |
          mirante-linux-amd64
          mirante-linux-arm64
          mirante-darwin-amd64
          mirante-darwin-arm64
          mirante-windows-amd64.exe
        generate_release_notes: true
        draft: false
        prerelease: ${{ steps.release.outputs.prerelease }}
        token: ${{ secrets.RELEASE_TOKEN }}
