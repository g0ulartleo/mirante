name: Release NPM Alarms SDK

on:
  push:
    tags:
      - 'packages/npm/alarms/v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/npm/alarms
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - run: npm ci

    - name: Verify proto copy
      run: |
        node -e "
          var fs=require('fs');
          var src='../../../proto/alarms/v1/alarms.proto';
          if(!fs.existsSync(src)) throw new Error('root proto not found at ' + src);
          fs.copyFileSync(src, 'runtime.proto');
          if(!fs.existsSync('runtime.proto')) throw new Error('runtime.proto not copied');
        "

    - run: npm test

    - run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
